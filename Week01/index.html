  <title>Garlic Butter Pasta</title>

<body>

  <h1>Garlic Butter Pasta</h1>

  <img 
    src="https://via.placeholder.com/400x300" 
    alt="Garlic Butter Pasta">

  <p>
    A quick and comforting pasta dish made with garlic, butter, and parmesan.
  </p>

  <h2>Ingredients</h2>
  <ul>
    <li>Pasta</li>
    <li>Garlic</li>
    <li>Butter</li>
    <li>Parmesan</li>
    <li>Salt & Pepper</li>
  </ul>

  <h2>Instructions</h2>
  <ol>
    <li>Boil the pasta.</li>
    <li>Sauté garlic in butter.</li>
    <li>Combine pasta with sauce.</li>
    <li>Serve hot.</li>
  </ol>
